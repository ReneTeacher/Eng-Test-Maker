# Render 部署配置

services:
  - type: web
    name: eng-test-maker
    env: node
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # 以下 secrets 由 Render/Zeabur dashboard 注入，切勿將值 commit 入 repo
      - key: DATABASE_URL
        sync: false
      - key: MINIMAX_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: POE_API_KEY
        sync: false
